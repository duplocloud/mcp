name: 🗿 Python Package

on:
  workflow_dispatch:
    inputs:
      push:
        description: Push the artifact to PyPi?
        default: false
        type: boolean
      tag:
        description: Tag to build
        required: true
        type: string
  workflow_call:
    inputs:
      push:
        description: Push the artifact to PyPi?
        default: true
        type: boolean
      tag:
        description: Tag to build
        required: true
        type: string
    outputs:
      version:
        description: The true version of the package
        value: ${{ jobs.package.outputs.version }}
      package:
        description: The package artifact name
        value: ${{ jobs.package.outputs.package }}
jobs:
  package:
    name: Package
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: ${{ inputs.push && 'pypi' || '' }}
      url: ${{ inputs.push && 'https://pypi.org/project/duplocloud-mcp' || '' }}
    outputs:
      version: ${{ steps.check_version.outputs.version }}
      package: ${{ steps.check_version.outputs.package }}
    steps:

    - name: Checkout Code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.tag }}
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
        cache: pip
        cache-dependency-path: pyproject.toml

    - name: Install Dependencies
      run: pip install .[build]

    - name: Check True Version
      id: check_version
      run: |
        version=$(python -m setuptools_scm)
        package="duplocloud_mcp-${version}"
        echo "Building Version: $version"
        echo "version=$version" >> $GITHUB_OUTPUT
        echo "package=$package" >> $GITHUB_OUTPUT

    - name: Run the Build
      run: python -m build

    - name: Show Files
      run: ls -l dist

    - name: Publish Package to PyPI
      if: inputs.push == true
      uses: pypa/gh-action-pypi-publish@release/v1

    - name: Github Artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.check_version.outputs.package }}
        path: dist/*.tar.gz
